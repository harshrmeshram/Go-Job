version: '3.9'
services:
  web:
    build:
      context: .
      dockerfile: ./docker/web.Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: ./docker/api.Dockerfile
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/gojob
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  extension:
    build:
      context: .
      dockerfile: ./docker/extension.Dockerfile
    ports:
      - '5173:5173'
